name: Run Unity in batch mode
description: Run the Unity editor CLI in batch mode, resolving the editor path from the project version.

inputs:
  project-path:
    description: Path to the Unity project root.
    required: false
    default: "."
  unity-editor-path:
    description: Explicit path to the Unity editor executable. If empty, it is resolved from the version under the default Unity Hub install location (/Applications/Unity/Hub/Editor on macOS, C:/Program Files/Unity/Hub/Editor on Windows).
    required: false
    default: ""
  execute-method:
    description: Static C# method to execute (-executeMethod). Leave empty to omit.
    required: false
    default: ""
  no-graphics:
    description: Run without a graphics device (-nographics). On Windows, -force-d3d11 is used instead when false.
    required: false
    default: "true"
  quit:
    description: Quit after execution (-quit). Set to "false" when running tests via -runTests.
    required: false
    default: "true"
  silent-crashes:
    description: Suppress the crash dialog (-silent-crashes).
    required: false
    default: "true"
  additional-args:
    description: Extra CLI arguments, space-separated. Each whitespace-delimited token becomes one argument, so an individual value cannot contain spaces. Use this for command-specific flags such as -buildTarget Android, -runTests, or -developmentBuild true.
    required: false
    default: ""

outputs:
  unity-version:
    description: The resolved Unity editor version.
    value: ${{ steps.project-version.outputs.unity-version }}
  log-path:
    description: Path to the captured log file.
    value: ${{ steps.run.outputs.log-path }}

runs:
  using: composite
  steps:
    # composite からは相対 uses (./...) が呼び出し側 workspace 基準で解決され使えないため
    # (actions/runner#1348)、同一リポジトリの project-version を絶対参照で呼ぶ。
    - name: Get project version
      id: project-version
      uses: VeyronSakai/actions/unity/project-version@d21ef60197a93970e134c6dfe8f6f6ce11259cfc
      with:
        project-path: ${{ inputs.project-path }}

    - name: Run Unity
      id: run
      shell: pwsh
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        UNITY_VERSION: ${{ steps.project-version.outputs.unity-version }}
        UNITY_EDITOR_PATH: ${{ inputs.unity-editor-path }}
        EXECUTE_METHOD: ${{ inputs.execute-method }}
        NO_GRAPHICS: ${{ inputs.no-graphics }}
        QUIT: ${{ inputs.quit }}
        SILENT_CRASHES: ${{ inputs.silent-crashes }}
        ADDITIONAL_ARGS: ${{ inputs.additional-args }}
      run: |
        $ErrorActionPreference = "Stop"

        $version = $env:UNITY_VERSION

        # --- Resolve editor path ---
        # Use unity-editor-path if given; otherwise build the path from the
        # default Unity Hub install location and the resolved version.
        $editorPath = $env:UNITY_EDITOR_PATH
        if ([string]::IsNullOrWhiteSpace($editorPath)) {
          if ($IsWindows) {
            $editorPath = "C:/Program Files/Unity/Hub/Editor/$version/Editor/Unity.exe"
          } elseif ($IsMacOS) {
            $editorPath = "/Applications/Unity/Hub/Editor/$version/Unity.app/Contents/MacOS/Unity"
          } else {
            throw "Unsupported OS: $($PSVersionTable.OS)"
          }
        }
        if (-not (Test-Path -LiteralPath $editorPath)) {
          throw "Unity editor not found at $editorPath"
        }
        Write-Host "Using Unity $version at $editorPath"

        # --- Build argument list ---
        $unityArgs = @("-batchmode", "-projectPath", $env:PROJECT_PATH, "-logFile", "-")
        if ($env:SILENT_CRASHES -eq "true") { $unityArgs += "-silent-crashes" }
        if ($env:QUIT -eq "true")           { $unityArgs += "-quit" }
        if ($env:NO_GRAPHICS -eq "true") {
          $unityArgs += "-nographics"
        } elseif ($IsWindows) {
          $unityArgs += "-force-d3d11"
        }
        if (-not [string]::IsNullOrWhiteSpace($env:EXECUTE_METHOD)) {
          $unityArgs += @("-executeMethod", $env:EXECUTE_METHOD)
        }
        # additional-args: space-separated; split on any whitespace.
        if (-not [string]::IsNullOrWhiteSpace($env:ADDITIONAL_ARGS)) {
          $unityArgs += ($env:ADDITIONAL_ARGS -split '\s+' | Where-Object { $_ })
        }

        # --- Run ---
        $timestamp = Get-Date -UFormat %s
        $logPath = "unity_${timestamp}.log"
        "log-path=$logPath" >> $env:GITHUB_OUTPUT
        & $editorPath $unityArgs | Tee-Object -FilePath $logPath
        exit $LASTEXITCODE

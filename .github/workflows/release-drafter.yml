name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  release:
    types:
      - published

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  update-draft:
    name: Update release draft
    # リリース公開時はタグ移動のみ行うため、ドラフト更新はスキップする。
    if: ${{ github.event_name != 'release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2 # v6.1.0
        with:
          commitish: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  move-tags:
    name: Move major/minor tags
    # ドラフトを publish した時に major(vX) / minor(vX.Y) の移動タグを張り替える。
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: true
      - name: Move major and minor tags
        run: |
          if ($env:VERSION -notmatch '^v?(\d+)\.(\d+)\.(\d+)') {
            throw "Unable to parse version: $env:VERSION"
          }
          $major = "v$($Matches[1])"
          $minor = "v$($Matches[1]).$($Matches[2])"
          Write-Host "Moving $major and $minor to $env:VERSION"
          git push -f origin "refs/tags/${env:VERSION}:refs/tags/$major"
          git push -f origin "refs/tags/${env:VERSION}:refs/tags/$minor"

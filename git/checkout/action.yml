name: Checkout repository
description: Run actions/checkout with optional custom Git LFS endpoint resolution from .lfsconfig

inputs:
  github-token:
    description: GitHub token for gh api and actions/checkout. Required when lfs is true.
    required: false
  lfs:
    description: Whether to enable Git LFS and resolve a custom endpoint from .lfsconfig
    required: false
    default: "false"
  clean:
    description: Whether to use actions/checkout clean before creating or resetting the repository
    required: false
    default: "false"
  persist-credentials:
    description: Whether to configure the token or SSH key with the local git config
    required: false
    default: "true"
  submodules:
    description: Whether to checkout submodules. false, true, or recursive
    required: false
    default: "false"

outputs:
  lfs-url:
    description: LFS endpoint URL from .lfsconfig when lfs is enabled
    value: ${{ steps.read-lfs-config.outputs.lfs-url }}

runs:
  using: composite
  steps:
    - name: Capture existing submodule paths
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        $baselinePath = Join-Path $env:RUNNER_TEMP "checkout-existing-submodules-$env:GITHUB_RUN_ID.txt"
        $paths = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::Ordinal)
        $pathComparison = [System.StringComparison]::Ordinal
        if ($IsWindows) {
          $pathComparison = [System.StringComparison]::OrdinalIgnoreCase
        }

        function Add-SubmodulePathsFromLines {
          param([string[]] $Lines)

          foreach ($line in $Lines) {
            if ([string]::IsNullOrWhiteSpace($line)) {
              continue
            }

            $parts = $line -split "\s+", 2
            if ($parts.Count -eq 2 -and -not [string]::IsNullOrWhiteSpace($parts[1])) {
              [void] $paths.Add($parts[1])
            }
          }
        }

        function Add-SubmodulePathFromWorktree {
          param(
            [string] $ModuleGitDir,
            [string] $Worktree
          )

          if ([string]::IsNullOrWhiteSpace($Worktree)) {
            return
          }

          $workspace = [System.IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)
          if (-not $workspace.EndsWith([System.IO.Path]::DirectorySeparatorChar)) {
            $workspace = "$workspace$([System.IO.Path]::DirectorySeparatorChar)"
          }

          $fullPath = [System.IO.Path]::GetFullPath((Join-Path $ModuleGitDir $Worktree))
          if (-not $fullPath.StartsWith($workspace, $pathComparison)) {
            return
          }

          $relativePath = [System.IO.Path]::GetRelativePath($workspace, $fullPath).Replace("\", "/")
          if (-not [string]::IsNullOrWhiteSpace($relativePath)) {
            [void] $paths.Add($relativePath)
          }
        }

        if (Test-Path ".gitmodules") {
          $gitmodulesLines = & git config --file .gitmodules --get-regexp "submodule\..*\.path" 2>$null
          if ($LASTEXITCODE -eq 0) {
            Add-SubmodulePathsFromLines $gitmodulesLines
          }
        }

        if (Test-Path ".git") {
          $localConfigLines = & git config --local --get-regexp "submodule\..*\.path" 2>$null
          if ($LASTEXITCODE -eq 0) {
            Add-SubmodulePathsFromLines $localConfigLines
          }

          $gitDir = & git rev-parse --git-dir 2>$null
          if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($gitDir)) {
            $modulesRoot = Join-Path $gitDir "modules"
            if (Test-Path $modulesRoot) {
              foreach ($config in Get-ChildItem -Path $modulesRoot -Filter config -Recurse -File) {
                $worktree = & git config --file $config.FullName --get core.worktree 2>$null
                if ($LASTEXITCODE -eq 0) {
                  Add-SubmodulePathFromWorktree (Split-Path -Parent $config.FullName) $worktree
                }
              }
            }
          }
        }

        $sortedPaths = @($paths | Sort-Object)
        Set-Content -Path $baselinePath -Value $sortedPaths -Encoding utf8

    - name: Read LFS config
      if: ${{ inputs.lfs == 'true' }}
      id: read-lfs-config
      shell: pwsh
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        if (-not $env:GH_TOKEN) {
          throw "github-token is required when lfs is true."
        }

        $content = gh api "repos/$env:GITHUB_REPOSITORY/contents/.lfsconfig?ref=$env:GITHUB_SHA" --jq .content

        # GitHub's Contents API may wrap base64 content with line breaks, so strip all whitespace before decoding.
        $lfsConfig = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String(($content -replace '\s', '')))

        # (?m) enables multi-line mode, then this pattern finds the `url = ...` line while tolerating surrounding spaces and captures only the URL value.
        $match = [regex]::Match($lfsConfig, '(?m)^\s*url\s*=\s*(.+?)\s*$')
        if (-not $match.Success) {
          throw "lfs.url was not found in .lfsconfig."
        }

        "lfs-url=$($match.Groups[1].Value)" >> $env:GITHUB_OUTPUT

    - name: Checkout with LFS
      if: ${{ inputs.lfs == 'true' }}
      uses: actions/checkout@v6
      env:
        GIT_CONFIG_COUNT: 2
        GIT_CONFIG_KEY_0: lfs.url
        GIT_CONFIG_VALUE_0: ${{ steps.read-lfs-config.outputs.lfs-url }}
        GIT_CONFIG_KEY_1: remote.origin.lfsurl
        GIT_CONFIG_VALUE_1: ${{ steps.read-lfs-config.outputs.lfs-url }}
      with:
        clean: ${{ inputs.clean }}
        lfs: true
        persist-credentials: ${{ inputs.persist-credentials }}
        submodules: ${{ inputs.submodules }}
        token: ${{ inputs.github-token || github.token }}

    - name: Checkout
      if: ${{ inputs.lfs != 'true' }}
      uses: actions/checkout@v6
      with:
        clean: ${{ inputs.clean }}
        lfs: false
        persist-credentials: ${{ inputs.persist-credentials }}
        submodules: ${{ inputs.submodules }}
        token: ${{ inputs.github-token || github.token }}

    - name: Remove stale submodule worktrees
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        $baselinePath = Join-Path $env:RUNNER_TEMP "checkout-existing-submodules-$env:GITHUB_RUN_ID.txt"
        if (-not (Test-Path $baselinePath)) {
          return
        }

        $pathComparison = [System.StringComparison]::Ordinal
        if ($IsWindows) {
          $pathComparison = [System.StringComparison]::OrdinalIgnoreCase
        }

        $workspace = [System.IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)
        if (-not $workspace.EndsWith([System.IO.Path]::DirectorySeparatorChar)) {
          $workspace = "$workspace$([System.IO.Path]::DirectorySeparatorChar)"
        }

        $oldPaths = @(Get-Content -Path $baselinePath | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
        if ($oldPaths.Count -eq 0) {
          return
        }

        $currentPaths = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::Ordinal)
        if (Test-Path ".gitmodules") {
          $currentLines = & git config --file .gitmodules --get-regexp "submodule\..*\.path" 2>$null
          if ($LASTEXITCODE -eq 0) {
            foreach ($line in $currentLines) {
              $parts = $line -split "\s+", 2
              if ($parts.Count -eq 2 -and -not [string]::IsNullOrWhiteSpace($parts[1])) {
                [void] $currentPaths.Add($parts[1])
              }
            }
          }
        }

        foreach ($path in $oldPaths) {
          if ($currentPaths.Contains($path)) {
            continue
          }

          if ([System.IO.Path]::IsPathFullyQualified($path)) {
            Write-Warning "Skipping stale submodule path outside the workspace: $path"
            continue
          }

          $fullPath = [System.IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE $path))
          if (-not $fullPath.StartsWith($workspace, $pathComparison)) {
            Write-Warning "Skipping stale submodule path outside the workspace: $path"
            continue
          }

          $trackedFiles = & git ls-files -- $path 2>$null
          if ($LASTEXITCODE -eq 0 -and $trackedFiles) {
            Write-Host "Skipping former submodule path because it is tracked in the current tree: $path"
            continue
          }

          if (Test-Path -LiteralPath $fullPath) {
            Write-Host "Removing stale submodule worktree: $path"
            Remove-Item -LiteralPath $fullPath -Recurse -Force
          }
        }

    - name: Clean workspace
      shell: pwsh
      run: |
        git clean -df
        git reset --hard HEAD
